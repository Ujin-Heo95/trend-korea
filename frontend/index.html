<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png" />
  <title>위클릿 — 실시간 트렌드 모아보기</title>
  <meta name="description" content="위클릿은 한국 주요 커뮤니티, 뉴스, YouTube에서 실시간 이슈를 모아보는 트렌드 어그리게이터입니다" />
  <meta property="og:title" content="위클릿 — 실시간 트렌드 모아보기" />
  <meta property="og:description" content="위클릿은 한국 주요 커뮤니티, 뉴스, YouTube에서 실시간 이슈를 모아보는 트렌드 어그리게이터입니다" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ko_KR" />
  <meta property="og:url" content="https://weeklit.net" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="위클릿 — 실시간 트렌드 모아보기" />
  <meta name="twitter:description" content="위클릿은 한국 주요 커뮤니티, 뉴스, YouTube에서 실시간 이슈를 모아보는 트렌드 어그리게이터입니다" />
  <link rel="canonical" href="https://weeklit.net/" />
  <link rel="alternate" type="application/rss+xml" title="위클릿 RSS" href="https://weeklit.net/api/feed/rss" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" /></noscript>
  <script>
    // 다크모드 FOUC 방지: CSS 파싱 전 즉시 클래스 적용
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && matchMedia('(prefers-color-scheme: dark)').matches))
      document.documentElement.classList.add('dark');
  </script>
  <script>
    // API 프리페치: React 마운트 전에 랜딩 API 호출 시작
    (function() {
      var base = '%%VITE_API_BASE_URL%%';
      var W = window.__PREFETCH__ = {};
      var s = location.search;
      if (!s || s.indexOf('category') === -1) {
        W.issueRankings = fetch(base + '/issues?limit=30')
          .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
          .catch(function() { return null; });
      }
    })();
  </script>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="59b461c4-475e-407b-bddc-236879eed54b"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 transition-colors">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:z-[100] focus:top-2 focus:left-2 focus:px-4 focus:py-2 focus:bg-blue-600 focus:text-white focus:rounded-lg focus:text-sm focus:font-medium">본문으로 건너뛰기</a>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // updateViaCache: 'none' — sw.js 는 매번 네트워크에서 fetch (HTTP 캐시 우회).
    // 2026-04-12: CF Pages 의 max-age=14400 헤더가 옛 sw.js 를 4시간 캐시해서
    // 새 v5 SW 가 install 안 되던 사고. _headers 파일로 서버측도 함께 차단.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' });
      });
    }
  </script>
</body>
</html>
