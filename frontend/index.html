  <script>
    // 다크모드 FOUC 방지: CSS 파싱 전 즉시 클래스 적용
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && matchMedia('(prefers-color-scheme: dark)').matches))
      document.documentElement.classList.add('dark');
  </script>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="59b461c4-475e-407b-bddc-236879eed54b"></script>

<body class="bg-slate-50 dark:bg-slate-900 transition-colors">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:z-[100] focus:top-2 focus:left-2 focus:px-4 focus:py-2 focus:bg-blue-600 focus:text-white focus:rounded-lg focus:text-sm focus:font-medium">본문으로 건너뛰기</a>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
