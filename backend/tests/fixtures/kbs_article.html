  도널드 트럼프 미국 대통령은 "세계 최강인 미 해군은 즉각 호르무즈 해협으로 들어오거나 떠나는 모든 선박에 대해 봉쇄 조치를 시작할 것"이라고 밝혔습니다.
  <br><br>
  트럼프 대통령은 현지시각 12일 자신의 소셜미디어(SNS) 트루스소셜에 "협상은 잘 진행됐고 대부분 사항이 합의됐지만 유일하게 정말 중요한 사항인 핵은 그렇지 못했다"며 이같이 적었습니다.
  <br><br>
  이란과의 협상 결렬 이후 나온 이번 발언은 국제 유가와 안보 질서에 즉각적인 파장을 일으킬 전망입니다.
