name: Railway Auto-Redeploy

on:
  workflow_dispatch:
  # CI 완료 후 트리거 — Railway 배포 실패 시 수동 또는 자동 재시도
  repository_dispatch:
    types: [railway-deploy-failed]

jobs:
  redeploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    strategy:
      max-parallel: 1
    steps:
      - name: Trigger Railway Redeploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN not set, skipping redeploy"
            exit 0
          fi

          MAX_RETRIES=2
          RETRY_DELAY=30

          for i in $(seq 1 $MAX_RETRIES); do
            echo "Redeploy attempt $i/$MAX_RETRIES..."

            RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
              "https://backboard.railway.com/graphql/v2" \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"query":"mutation { serviceInstanceRedeploy(serviceId: \"'${{ vars.RAILWAY_SERVICE_ID }}'\" environmentId: \"'${{ vars.RAILWAY_ENV_ID }}'\") }"}')

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Redeploy triggered successfully"
              echo "$BODY"
              exit 0
            fi

            echo "Attempt $i failed (HTTP $HTTP_CODE): $BODY"

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Waiting ${RETRY_DELAY}s before retry..."
              sleep $RETRY_DELAY
              RETRY_DELAY=$((RETRY_DELAY * 2))
            fi
          done

          echo "::error::All redeploy attempts failed"
          exit 1
